name: Static CI/CD

on:
  push:
    branches: [main, master]

jobs:
  build-and-deploy:
    runs-on: self-hosted

    env:
      IMAGE_REPOSITORY: ${{ secrets.CONTAINER_IMAGE_REPOSITORY }}
      IMAGE_TAG: ${{ github.sha }}
      CONTAINER_REGISTRY_HOST: ${{ secrets.CONTAINER_REGISTRY_HOST }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.150.0'
          extended: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.CONTAINER_REGISTRY_HOST }}
          username: ${{ secrets.GITLAB_REGISTRY_USER }}
          password: ${{ secrets.GITLAB_REGISTRY_PASSWORD }}

      - name: Build and push image
        run: |
          set -euo pipefail
          test -n "${IMAGE_REPOSITORY}"
          docker build -t "${IMAGE_REPOSITORY}:${IMAGE_TAG}" -t "${IMAGE_REPOSITORY}:main" .
          docker push "${IMAGE_REPOSITORY}:${IMAGE_TAG}"
          docker push "${IMAGE_REPOSITORY}:main"

      - name: Package build artifact
        run: tar -czf public.tar.gz -C public .

      - name: Configure SSH key
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          echo "${{ secrets.CADDY_SSH_PRIVATE_KEY_B64 }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.CADDY_DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy static build to Caddy
        run: |
          set -euo pipefail
          host="${{ secrets.CADDY_DEPLOY_HOST }}"
          user="${{ secrets.CADDY_DEPLOY_USER }}"
          target="/opt/caddy/www/irinabalanel/resume"
          scp public.tar.gz "${user}@${host}:/tmp/resume-${GITHUB_SHA}.tar.gz"
          ssh "${user}@${host}" "
            set -euo pipefail
            tmp='${target}.new.${GITHUB_SHA}'
            rm -rf \"\$tmp\"
            mkdir -p \"\$tmp\"
            tar -xzf /tmp/resume-${GITHUB_SHA}.tar.gz -C \"\$tmp\"
            rm -f /tmp/resume-${GITHUB_SHA}.tar.gz
            rm -rf '${target}'
            mv \"\$tmp\" '${target}'
          "

      - name: Smoke test
        run: curl -fsS https://resume.irinabalanel.com >/dev/null
